databases:
  - name: myapp-postgres
    databaseName: volunteer_tree_ik16
    user: m_nagasaka
    region: Ohio


services:
  - type: web
    name: volunteer_tree_ik16
    env: ruby
    region: Oregon
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "build exec puma -C config/puma.rb"
    preDeployCommand: ./bin/rails db:migrate
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer_tree_ik16
          property: connectionString
      - key: TAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
